embedding:
  brisque_enabled: true
  device: auto
  enabled: true
  models:
    aesthetic:
      description: Punteggio estetico (qualità artistica)
      enabled: true
      model_name: aesthetic-predictor
      returns_score: true
    bioclip:
      description: Classificazione flora/fauna TreeOfLife (~450k specie)
      enabled: true
      max_tags: 3
      threshold: 0.2
    clip:
      description: Ricerca semantica (query naturali)
      enabled: true
      model_name: openai/clip-vit-large-patch14
    dinov2:
      description: Similarità visiva (composizione, texture, forma)
      enabled: true
      model_name: facebook/dinov2-base
      similarity_threshold: 0.2
    llm_vision:
      auto_import:
        description:
          enabled: true
          max_words: 50
          overwrite: true
        tags:
          enabled: true
          max_tags: 10
          overwrite: true
        title:
          enabled: true
          max_words: 10
          overwrite: true
      backend: ollama
      description: Genera tag, descrizioni e titoli con LLM Vision
      enabled: true
      endpoint: http://localhost:11434
      generation:
        keep_alive: -1
        num_batch: 1024
        num_ctx: 4096
        temperature: 0.2
        top_k: 40
        top_p: 0.8
      model: qwen3.5:4b-q4_K_M
      timeout: 240
    technical:
      description: Punteggio tecnico qualità MUSIQ (pyiqa)
      device: cpu
      enabled: true
      model_name: musiq
export:
  advanced:
    xmp_merge_keywords: true
    xmp_preserve_color_label: true
    xmp_preserve_description: true
    xmp_preserve_rating: true
    xmp_preserve_title: true
  format:
    copy: false
    copy_exclude_exif: false
    copy_exclude_gps: false
    copy_overwrite: false
    copy_preserve_structure: false
    csv: false
    csv_exclude_exif: false
    csv_exclude_gps: false
    dng_allow_embedded: false
    embedded: false
    sidecar: true
external_editors:
  editor_1:
    command_args: ''
    enabled: false
    name: Lightroom
    path: ''
  editor_2:
    command_args: nosplash
    enabled: false
    name: PhotoLab
    path: ''
  editor_3:
    command_args: ''
    enabled: false
    name: ''
    path: ''
image_optimization:
  enabled: true
  extraction_methods:
    fast_thumbnail: Veloce con thumbnail embedded
    high_quality: Alta qualità con preview/JPEG embedded
    preview_optimized: Bilanciato qualità/velocità
    rawpy_full: Estrazione RAW completa con rawpy (massima qualità)
  profiles:
    aesthetic_score:
      method: preview_optimized
      quality: 75
      resampling: BILINEAR
      target_size: 224
      upscale: false
    ai_processing:
