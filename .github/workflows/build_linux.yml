name: Build Linux Installer

# Parte automaticamente ogni volta che viene creato un tag versione (es. v1.0.1)
on:
  push:
    tags:
      - 'v*.*.*'

# Permessi necessari per caricare file sulla Release GitHub
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice del repository sulla macchina Linux di GitHub
      - name: Checkout codice
        uses: actions/checkout@v4

      # 2. Installa Python 3.12 e tkinter tramite apt (più affidabile di conda su CI)
      - name: Installa Python e dipendenze di sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3.12 python3.12-tk python3.12-venv python3-pip

      # 3. Installa PyInstaller in un virtualenv
      - name: Installa PyInstaller
        run: |
          python3.12 -m venv .venv
          .venv/bin/pip install --quiet pyinstaller

      # 4. Esegue la build: PyInstaller legge lo .spec e produce il binary
      - name: Compila OffGallerySetup (Linux)
        run: |
          cd B_INSTALLER
          ../.venv/bin/python -m PyInstaller OffGallerySetup_linux.spec --clean --noconfirm
          ls -lh dist/OffGallerySetup

      # 5. Rinomina il file includendo la versione nel nome
      - name: Rinomina binary con versione
        run: |
          mv B_INSTALLER/dist/OffGallerySetup B_INSTALLER/dist/OffGallerySetup-${{ github.ref_name }}

      # 6. Allega il binary alla Release GitHub che corrisponde al tag appena pushato
      - name: Carica binary sulla Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: B_INSTALLER/dist/OffGallerySetup-${{ github.ref_name }}
